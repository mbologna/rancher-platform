---
- name: Define cluster lists
  set_fact:
    management_cluster_def: { 'name': '{{ management_cluster }}', 'engine': 'kind' }
    workload_clusters_defs: "{{ workload_clusters }}"

- name: Create management cluster
  ansible.builtin.include_role:
    name: cluster_creation_task
  vars:
    cluster: "{{ management_cluster_def }}"

- name: Wait for management cluster API and export kubeconfig
  shell: |
    set -e
    kind get kubeconfig --name {{ management_cluster }} > {{ kubeconfig_dir }}/{{ management_cluster }}-kubeconfig.yaml
    chmod 600 {{ kubeconfig_dir }}/{{ management_cluster }}-kubeconfig.yaml
  register: kubeconfig_export
  until: kubeconfig_export.rc == 0
  retries: 20
  delay: 15
  changed_when: false

- name: Create workload clusters in parallel
  command: "/opt/homebrew/bin/ansible-playbook create_workload_cluster.yml -e 'cluster={{ item | to_json }}'"
  loop: "{{ workload_clusters_defs }}"
  async: 3600
  poll: 0
  register: workload_cluster_creation_jobs
  delegate_to: localhost
  become: no

- name: Wait for workload clusters to be created
  async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ workload_cluster_creation_jobs.results }}"
  register: workload_cluster_results
  until: workload_cluster_results.finished
  retries: 120
  delay: 30
  delegate_to: localhost
  become: no

- name: Install cert-manager on management cluster
  include_tasks: install_cert_manager.yml
  vars:
    cluster: "{{ management_cluster_def }}"

- name: "Wait for cluster APIs to be ready and export kubeconfigs for workload clusters"
  shell: |
    set -e
    {% if item.engine == 'k3d' %}
    k3d kubeconfig get {{ item.name }} > {{ kubeconfig_dir }}/{{ item.name }}-kubeconfig.yaml
    {% else %}
    kind get kubeconfig --name {{ item.name }} > {{ kubeconfig_dir }}/{{ item.name }}-kubeconfig.yaml
    {% endif %}
    chmod 600 {{ kubeconfig_dir }}/{{ item.name }}-kubeconfig.yaml
  register: kubeconfig_export
  until: kubeconfig_export.rc == 0
  retries: 20
  delay: 15
  changed_when: false
  loop: "{{ workload_clusters_defs }}"

- name: Deploy Rancher Manager
  ansible.builtin.include_role:
    name: rancher_manager
