---
- name: Provision a single cluster
  hosts: localhost
  connection: local
  gather_facts: false
  become: yes

  # This playbook expects 'cluster_name' and 'cluster_engine' to be passed as extra vars.
  # Example: ansible-playbook provision_single_cluster.yml -e "cluster_name=dev-cluster-01-kind cluster_engine=kind"

  vars_files:
    - "vars/config.yml"
    - "vars/kind.yml"
    - "vars/k3d.yml"

  vars:
    # Reconstruct the 'cluster' variable that the role expects
    cluster:
      name: "{{ cluster_name }}"
      engine: "{{ cluster_engine }}"

    # Define other variables the role might need from the main playbook
    kubeconfig_dir: "{{ ansible_env.HOME }}/.rancher-dev/kubeconfigs"
    management_cluster: "management-cluster"

  tasks:
    - name: Run cluster creation task role for {{ cluster_name }}
      ansible.builtin.include_role:
        name: cluster_creation_task
