---
- name: Load main configuration for import tasks
  include_vars: "vars/config.yml"

- name: Get existing clusters from Rancher Manager
  uri:
    url: "https://{{ rancher_hostname }}:443/v3/clusters"
    method: GET
    validate_certs: false
    headers:
      Authorization: "Bearer {{ rancher_api_token }}"
  register: existing_rancher_clusters

- name: Set fact with existing Rancher Manager cluster names
  set_fact:
    rancher_cluster_names: "{{ existing_rancher_clusters.json.data | map(attribute='name') | list }}"

- name: Create cluster import manifest for new clusters
  uri:
    url: "https://{{ rancher_hostname }}:443/v3/clusters"
    method: POST
    body_format: json
    validate_certs: false
    headers:
      Authorization: "Bearer {{ rancher_api_token }}"
    body:
      type: cluster
      name: "{{ item.name }}"
      description: "Auto-imported {{ item.name }} cluster"
      labels:
        environment: development
        cluster-type: workload
        created-by: ansible
    status_code: [200, 201]
  register: cluster_registration
  loop: "{{ clusters_to_create | default(workload_clusters) }}"
  when: item.name not in rancher_cluster_names

- name: Apply cluster import manifests
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_dir }}/{{ item.item.name }}-kubeconfig.yaml"
    definition: "{{ lookup('url', item.json.actions.importYaml, validate_certs=false) | from_yaml_all | list }}"
  loop: "{{ (cluster_registration | default({'results': []})).results }}"
  when: not item.skipped | default(false)
  register: import_results
  async: 120
  poll: 0

- name: Wait for cluster import to complete
  async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ import_results.results }}"
  when: import_results is defined and item.ansible_job_id is defined
  register: import_completion
  until: import_completion.finished
  retries: 10
  delay: 15

- name: Create cluster import status script
  copy:
    content: |-
      #!/bin/bash
      echo "=== Cluster Import Status ==="
      echo "Rancher Manager URL: https://{{ rancher_hostname }}:443"
      echo "Login: admin / {{ rancher_bootstrap_password }}"
      echo ""

      RANCHER_TOKEN=\"$(cat {{ ansible_env.HOME }}/.rancher-dev/rancher-api-token)\" 

      for cluster in {{ workload_clusters | map(attribute='name') | join(' ') }};
      do
        echo "Checking $cluster..."
        curl -sk -H "Authorization: Bearer $RANCHER_TOKEN" \
             "https://{{ rancher_hostname }}:443/v3/clusters" | \
        jq -r ".data[] | select(.name==\"$cluster\") | \"  Status: \" + .state + \" | Nodes: \" + (.nodeCount // 0 | tostring)"
        echo ""
      done
    dest: "/usr/local/bin/check-cluster-imports"
    mode: '0755'

- name: Display import instructions
  debug:
    msg:
      - "Clusters have been automatically imported into Rancher Manager"
      - "Check status with: check-cluster-imports"
      - "Manual verification at: https://{{ rancher_hostname }}:443"
