---
- name: Check cluster existence
  shell: |
    if [ "{{ cluster.engine }}" == "kind" ]; then
      kind get clusters | grep -q '^{{ cluster.name }}$'
    elif [ "{{ cluster.engine }}" == "k3d" ]; then
      k3d cluster list | grep -q '^{{ cluster.name }}\s'
    fi
  register: cluster_exists
  changed_when: false
  failed_when: false

- name: Restart cluster containers if the cluster already exists
  shell: |
    if [ "{{ cluster.engine }}" == "kind" ]; then
      docker restart $(docker ps -a -q --filter "label=io.x-k8s.kind.cluster={{ cluster.name }}")
    elif [ "{{ cluster.engine }}" == "k3d" ]; then
      docker restart $(docker ps -a -q --filter "name=k3d-{{ cluster.name }}-*")
    fi
  when: cluster_exists.rc == 0

- name: Wait for cluster to stabilize after restart
  pause:
    seconds: 30
  when: cluster_exists.rc == 0

- name: Test cluster health
  shell: |
    {{ cluster.engine }} get kubeconfig --name {{ cluster.name }} | kubectl --kubeconfig=/dev/stdin get nodes --no-headers 2>/dev/null | wc -l || echo "0"
  register: cluster_health
  changed_when: false
  failed_when: false
  when: cluster_exists.rc == 0

- name: Check API server responsiveness
  shell: |
    {{ cluster.engine }} get kubeconfig --name {{ cluster.name }} | kubectl --kubeconfig=/dev/stdin cluster-info
  register: api_server_check
  changed_when: false
  failed_when: false
  when: cluster_exists.rc == 0

- name: Determine required number of nodes for health check
  set_fact:
    required_nodes: "{{ 8 if cluster.name == management_cluster else 3 }}"

- name: Create cluster configuration file
  template:
    src: "{{ 'kind-cluster.yaml.j2' if cluster.engine == 'kind' else 'k3d-cluster.yaml.j2' }}"
    dest: "{{ ansible_env.HOME }}/.rancher-dev/cluster-configs/{{ cluster.name }}-config.yaml"
  when: cluster_exists.rc != 0 or api_server_check.rc != 0 or (cluster_health.stdout | default('0') | int) != (required_nodes | int)

- name: Create cluster {{ cluster.name }}
  shell: |
    if [ "{{ cluster.engine }}" == "kind" ]; then
      kind delete cluster --name {{ cluster.name }} || true
      kind create cluster --config {{ ansible_env.HOME }}/.rancher-dev/cluster-configs/{{ cluster.name }}-config.yaml --wait 300s
    elif [ "{{ cluster.engine }}" == "k3d" ]; then
      k3d cluster delete {{ cluster.name }} || true
      k3d cluster create --config {{ ansible_env.HOME }}/.rancher-dev/cluster-configs/{{ cluster.name }}-config.yaml --kubeconfig-update-default=false --kubeconfig-switch-context=false
    fi
  when: cluster_exists.rc != 0 or api_server_check.rc != 0 or (cluster_health.stdout | default('0') | int) != (required_nodes | int)
