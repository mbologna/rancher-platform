---
- name: Generate final environment summary
  set_fact:
    env_summary:
      title: "🚀 RANCHER MANAGER + MULTI-ENGINE DEVELOPMENT ENVIRONMENT"
      clusters:
        management: "{{ management_cluster }}"
        workload_names: "{{ workload_clusters | default([]) | map(attribute='name') | list }}"
      access:
        rancher_url: "https://{{ rancher_hostname }}:443"
        username: "admin"
        password: "{{ rancher_bootstrap_password }}"
      kubeconfigs: "{{ kubeconfig_dir }}"

- name: Set summary content as a fact
  set_fact:
    summary_content: |
      ===============================================================================
      {{ env_summary.title }}
      ===============================================================================

      📋 CLUSTER OVERVIEW:
      Management Cluster: {{ env_summary.clusters.management }} (kind)
      Workload Clusters: {{ env_summary.clusters.workload_names | length }}
      {% for cluster in env_summary.clusters.workload_names %}
        - {{ cluster }}
      {% endfor %}

      🌐 ACCESS INFORMATION:
      Rancher Manager: {{ env_summary.access.rancher_url }}
      Username: {{ env_summary.access.username }}
      Password: {{ env_summary.access.password }}

      📁 KUBECONFIGS:
      Directory: {{ env_summary.kubeconfigs }}/
      Management: {{ env_summary.kubeconfigs }}/{{ env_summary.clusters.management }}-kubeconfig.yaml

      🛠️ DEVELOPMENT TOOLS:
      cluster-status        - Environment overview
      switch-cluster <name> - Switch kubectl context
      rancher-logs         - Stream Rancher Manager logs
      import-cluster <name> - Import cluster to Rancher
      cleanup-clusters     - Remove all clusters
      port-forward-rancher - Local Rancher access (port 8443)

      🚀 QUICK START:
      # Load development environment in your shell:
      source {{ ansible_env.HOME }}/.rancher-dev/dev-env-profile.sh

      # Check status
      cluster-status

      # Access workload cluster
      switch-cluster {{ env_summary.clusters.workload_names[0] | default('dev-cluster-01') }}

      # Import cluster to Rancher Manager
      import-cluster {{ env_summary.clusters.workload_names[0] | default('dev-cluster-01') }}

      ===============================================================================
      Environment ready! Access Rancher Manager at {{ env_summary.access.rancher_url }}
      ===============================================================================

- name: Create comprehensive environment summary
  copy:
    content: "{{ summary_content }}"
    dest: "{{ ansible_env.HOME }}/.rancher-dev/rancher-dev-summary.txt"
    mode: '0644'

- name: Display environment summary
  debug:
    msg: "{{ summary_content.split('\n') }}"

- name: Final status validation
  block:
    - name: Check cluster engine containers
      shell: |
        echo "=== Cluster Engine Containers ==="
        for engine in {{ required_engines }}; do
          echo "--- $engine clusters ---"
          $engine get clusters
          docker ps --format "table {% raw %}{{.Names}}\t{{.Status}}\t{{.Ports}}{% endraw %}" | grep $engine || true
          echo ""
        done
      register: container_status

    - name: Check Rancher Manager status
      shell: |
        echo "=== Rancher Manager Status ==="
        kubectl -n cattle-system get pods --kubeconfig="{{ kubeconfig_dir }}/{{ management_cluster }}-kubeconfig.yaml"
      register: rancher_status

    - name: Check cluster connectivity
      shell: |
        echo "=== Cluster Connectivity ==="
        for config in {{ kubeconfig_dir }}/*-kubeconfig.yaml; do
          cluster=$(basename "$config" -kubeconfig.yaml)
          echo "Testing $cluster..."
          kubectl --kubeconfig="$config" get nodes --no-headers 2>/dev/null | wc -l | xargs echo "  Nodes:"
        done
      register: connectivity_status

    - name: Display final status
      debug:
        msg: "{{ (container_status.stdout_lines + rancher_status.stdout_lines + connectivity_status.stdout_lines) }}"
