---
- name: Fetch external kubeconfig to local machine
  fetch:
    src: "{{ kubeconfig_dir }}/rke2-kubeconfig-external.yaml"
    dest: "~/.kube/rancher-platform.yaml"
    flat: yes

- name: Generate final environment summary
  set_fact:
    summary_content: |
      ===============================================================================
      🚀 RANCHER MANAGER ON RKE2 — READY
      ===============================================================================

      🌐 ACCESS
        Rancher UI:  https://{{ rancher_hostname }}
        Username:    admin
        Password:    {{ rancher_bootstrap_password }}

      🔑 KUBECONFIG
        Local file:  ~/.kube/rancher-platform.yaml  (fetched to your machine)
        SSH access:  ssh ec2-user@{{ ansible_host }}  (kubectl works via ~/.kube/config)

        Use locally:
          export KUBECONFIG=~/.kube/rancher-platform.yaml
          kubectl get nodes

      🚢 NEXT: add CAPI providers + ClusterClasses
        → https://github.com/mbologna/rancher-fleet-clusters
        Fleet has already registered that repo as a GitRepo (fleet-local namespace).
        Add or enable paths in the GitRepo to activate providers and ClusterClasses.

      ===============================================================================

- name: Create environment summary file on remote host
  copy:
    content: "{{ summary_content }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.rancher-dev/rancher-dev-summary.txt"
    mode: '0644'

- name: Display environment summary
  debug:
    msg: "{{ summary_content.split('\n') }}"

- name: Final status validation
  block:
    - name: Check RKE2 node status
      shell: kubectl --kubeconfig="{{ rke2_kubeconfig }}" get nodes -o wide
      register: node_status

    - name: Check Rancher Manager status
      shell: |
        echo "=== Rancher Manager Status ==="
        kubectl --kubeconfig="{{ rke2_kubeconfig }}" -n cattle-system get pods
      register: rancher_status

    - name: Display final status
      debug:
        msg: "{{ node_status.stdout_lines + rancher_status.stdout_lines }}"
