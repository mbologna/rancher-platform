---
# ── 1. Install Rancher Turtles (includes CAPI Operator) ──────────────────────

- name: Add Rancher Turtles Helm repository
  kubernetes.core.helm_repository:
    name: turtles
    repo_url: https://rancher.github.io/turtles
    state: present

- name: Install Rancher Turtles via Helm
  kubernetes.core.helm:
    name: rancher-turtles
    chart_ref: turtles/rancher-turtles
    chart_version: "{{ turtles_config.version }}"
    release_namespace: cattle-turtles-system
    create_namespace: true
    kubeconfig: "{{ rke2_kubeconfig }}"
    values:
      cluster-api-operator:
        cluster-api:
          enabled: true
    update_repo_cache: yes
    wait: true
    wait_timeout: 600s
  delegate_to: "{{ inventory_hostname }}"

- name: Wait for Turtles controller to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: rancher-turtles-controller-manager
    namespace: cattle-turtles-system
    kubeconfig: "{{ rke2_kubeconfig }}"
    wait: yes
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  delegate_to: "{{ inventory_hostname }}"

- name: Wait for Turtles CAPIProvider CRD to be established
  shell: >-
    kubectl --kubeconfig={{ rke2_kubeconfig }}
    get crd capiproviders.turtles-capi.cattle.io
    -o jsonpath='{.status.conditions[?(@.type=="Established")].status}' 2>/dev/null
  register: crd_established
  until: crd_established.stdout == "True"
  retries: 20
  delay: 10
  changed_when: false
  delegate_to: "{{ inventory_hostname }}"

# ── 2. Bootstrap CAPI core ────────────────────────────────────────────────────
# The CoreProvider CR tells CAPI Operator to take ownership of CAPI core.
# All other providers (rke2, docker, aws, metal3) are managed by Fleet via
# rancher-fleet-clusters — register that GitRepo after deploy.

- name: Patch clusterctl-config ConfigMap to register rke2, docker, aws, and metal3 providers
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: turtles-capi.cattle.io/v1alpha1
      kind: ClusterctlConfig
      metadata:
        # Name MUST be exactly "clusterctl-config" — enforced by webhook
        name: clusterctl-config
        namespace: cattle-turtles-system
      spec:
        providers:
          - name: rke2
            type: BootstrapProvider
            url: "https://github.com/rancher/cluster-api-provider-rke2/releases/download/{{ turtles_config.caprke2_version }}/bootstrap-components.yaml"
          - name: rke2
            type: ControlPlaneProvider
            url: "https://github.com/rancher/cluster-api-provider-rke2/releases/download/{{ turtles_config.caprke2_version }}/control-plane-components.yaml"
          - name: docker
            type: InfrastructureProvider
            url: "https://github.com/kubernetes-sigs/cluster-api/releases/download/{{ turtles_config.capd_version }}/infrastructure-components-development.yaml"
          - name: aws
            type: InfrastructureProvider
            url: "https://github.com/kubernetes-sigs/cluster-api-provider-aws/releases/download/{{ turtles_config.capa_version }}/infrastructure-components.yaml"
          - name: metal3
            type: InfrastructureProvider
            url: "https://github.com/metal3-io/cluster-api-provider-metal3/releases/download/{{ turtles_config.capm3_version }}/infrastructure-components.yaml"
  delegate_to: "{{ inventory_hostname }}"

- name: Restart Turtles controller to reload clusterctl config
  shell: |
    kubectl --kubeconfig={{ rke2_kubeconfig }} rollout restart \
      deployment/rancher-turtles-controller-manager -n cattle-turtles-system
    kubectl --kubeconfig={{ rke2_kubeconfig }} rollout status \
      deployment/rancher-turtles-controller-manager -n cattle-turtles-system \
      --timeout=120s
  changed_when: true
  delegate_to: "{{ inventory_hostname }}"

- name: Create cluster-api CoreProvider CR (triggers CAPI Operator to manage CAPI core)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: turtles-capi.cattle.io/v1alpha1
      kind: CAPIProvider
      metadata:
        name: cluster-api
        namespace: cattle-capi-system
      spec:
        name: cluster-api
        type: core
  delegate_to: "{{ inventory_hostname }}"

- name: Remove bootstrap capi-system namespace (Turtles manages CAPI in cattle-capi-system)
  kubernetes.core.k8s:
    state: absent
    kubeconfig: "{{ rke2_kubeconfig }}"
    kind: Namespace
    name: capi-system
    wait: false
  delegate_to: "{{ inventory_hostname }}"

# ── 3. Credential Secrets ─────────────────────────────────────────────────────
# Credentials cannot live in the public rancher-fleet-clusters repo.
# Ansible creates them here; Fleet-managed CAPIProviders reference them.

- name: Ensure namespaces exist for credential Secrets
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop:
    - default
    - capa-system
    - capm3-system
  delegate_to: "{{ inventory_hostname }}"

- name: Generate base64-encoded AWS credentials for CAPA controller
  set_fact:
    capa_b64_credentials: >-
      {{ ("[default]\naws_access_key_id = " + capa_credentials.aws_access_key_id +
          "\naws_secret_access_key = " + capa_credentials.aws_secret_access_key + "\n") | b64encode }}
  no_log: true

- name: Create CAPA AWS credentials Secret in capa-system (referenced by AWSClusterStaticIdentity)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        # CAPA v2 looks for the AWSClusterStaticIdentity secretRef in the controller's
        # namespace (capa-system), not the cluster's namespace.
        name: cluster-identity
        namespace: capa-system
      type: Opaque
      stringData:
        AccessKeyID: "{{ capa_credentials.aws_access_key_id }}"
        SecretAccessKey: "{{ capa_credentials.aws_secret_access_key }}"
  delegate_to: "{{ inventory_hostname }}"
  no_log: true

- name: Create CAPA credentials Secret for CAPIProvider variable substitution
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: capa-credentials
        namespace: capa-system
      type: Opaque
      stringData:
        AWS_B64ENCODED_CREDENTIALS: "{{ capa_b64_credentials }}"
  delegate_to: "{{ inventory_hostname }}"
  no_log: true

- name: Create CAPM3 Ironic credentials Secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ironic-credentials
        namespace: capm3-system
      type: Opaque
      stringData:
        IRONIC_URL: "{{ capm3_credentials.ironic_url }}"
        IRONIC_INSPECTOR_URL: "{{ capm3_credentials.ironic_inspector_url }}"
        IRONIC_USERNAME: "{{ capm3_credentials.ironic_username }}"
        IRONIC_PASSWORD: "{{ capm3_credentials.ironic_password }}"
  delegate_to: "{{ inventory_hostname }}"
  no_log: true

# ── 4. Register Fleet GitRepo for cluster templates ──────────────────────────
# Creates a Fleet GitRepo pointing to the public rancher-fleet-clusters repo.
# keepResources: true ensures Fleet never deletes CAPI resources when the
# GitRepo is deleted or paths change (avoids accidental cluster teardown).

- name: Create Fleet GitRepo for CAPI cluster templates
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ rke2_kubeconfig }}"
    definition:
      apiVersion: fleet.cattle.io/v1alpha1
      kind: GitRepo
      metadata:
        name: capi-cluster-templates
        namespace: fleet-local
      spec:
        repo: "{{ capi_git_repo_url }}"
        branch: "{{ capi_git_branch }}"
        paths:
          - providers/capa
          - providers/capm3
          - clusterclasses/aws-rke2
          - clusterclasses/metal3-rke2
          - clusters/aws-rke2-example
          - clusters/aws-eks-example
          - clusters/metal3-rke2-example
        keepResources: true
        targets:
          - clusterSelector: {}
  delegate_to: "{{ inventory_hostname }}"

# ── 5. Wait for CAPI clusters to be provisioned ──────────────────────────────

- name: Wait for each CAPI cluster to reach Provisioned phase
  shell: |
    kubectl --kubeconfig={{ rke2_kubeconfig }} \
      get cluster {{ item }} -n default \
      -o jsonpath='{.status.phase}' 2>/dev/null
  register: cluster_phase
  until: cluster_phase.stdout == "Provisioned"
  retries: 60
  delay: 30
  changed_when: false
  loop: "{{ capi_clusters }}"
  when: capi_clusters | length > 0
  delegate_to: "{{ inventory_hostname }}"

# ── 5. Wait for clusters to appear as imported in Rancher ────────────────────

- name: Wait for each cluster to appear as Active in Rancher
  uri:
    url: "https://{{ rancher_hostname }}/v3/clusters?name={{ item }}"
    method: GET
    validate_certs: false
    headers:
      Authorization: "Bearer {{ rancher_api_token }}"
    status_code: [200]
  register: rancher_cluster_check
  until: >
    rancher_cluster_check.json.data | length > 0 and
    rancher_cluster_check.json.data[0].state == 'active'
  retries: 40
  delay: 30
  loop: "{{ capi_clusters }}"
  when: capi_clusters | length > 0
  delegate_to: "{{ inventory_hostname }}"

- name: Display imported clusters
  debug:
    msg: "Cluster '{{ item.item }}' is active in Rancher Manager"
  loop: "{{ rancher_cluster_check.results }}"
  when: capi_clusters | length > 0

# ── 6. Post-import fixes for AWS workload clusters ───────────────────────────
# After Rancher imports a CAPI-provisioned cluster, cattle-cluster-agent is
# deployed on the workload cluster. In same-VPC scenarios, the Rancher hostname
# resolves to the management EC2's public IP, which causes hairpin routing
# failures from within the VPC (AWS does not allow EC2→EC2 via their own EIP).
# Fix: patch cattle-cluster-agent with a hostAlias pointing the Rancher hostname
# to the management EC2's private IP.
#
# Additionally, AWS CCM is required to set providerID on nodes and remove the
# cloud-provider uninitialized taint. Deploy it if not already present.

- name: Get workload cluster kubeconfig (CAPI-managed clusters only)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ item }}-kubeconfig"
    namespace: default
    kubeconfig: "{{ rke2_kubeconfig }}"
  register: workload_kubeconfig_secret
  loop: "{{ capi_clusters | select('match', 'aws-.*') | list }}"
  when: capi_clusters | length > 0
  delegate_to: "{{ inventory_hostname }}"

- name: Write workload kubeconfigs to temp files
  copy:
    content: "{{ (item.resources[0].data.value | b64decode) }}"
    dest: "/tmp/{{ item.item }}-kubeconfig.yaml"
    mode: '0600'
  loop: "{{ workload_kubeconfig_secret.results }}"
  when:
    - capi_clusters | length > 0
    - item.resources is defined
    - item.resources | length > 0
  no_log: true
  delegate_to: "{{ inventory_hostname }}"

- name: Patch cattle-cluster-agent with internal Rancher hostname alias
  kubernetes.core.k8s:
    kubeconfig: "/tmp/{{ item.item }}-kubeconfig.yaml"
    api_version: apps/v1
    kind: Deployment
    name: cattle-cluster-agent
    namespace: cattle-system
    strategic_merge_patch:
      spec:
        template:
          spec:
            hostAliases:
              - ip: "{{ ansible_default_ipv4.address }}"
                hostnames:
                  - "{{ rancher_hostname }}"
  loop: "{{ workload_kubeconfig_secret.results }}"
  when:
    - capi_clusters | length > 0
    - item.resources is defined
    - item.resources | length > 0
  ignore_errors: true   # cattle-system namespace may not exist yet on first run
  delegate_to: "{{ inventory_hostname }}"

- name: Deploy AWS Cloud Controller Manager on workload clusters
  kubernetes.core.k8s:
    kubeconfig: "/tmp/{{ item.item }}-kubeconfig.yaml"
    state: present
    definition: "{{ lookup('template', 'aws-ccm.yml.j2') }}"
  loop: "{{ workload_kubeconfig_secret.results }}"
  when:
    - capi_clusters | length > 0
    - item.resources is defined
    - item.resources | length > 0
  ignore_errors: true
  delegate_to: "{{ inventory_hostname }}"
