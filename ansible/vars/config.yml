---
# Central configuration for the development environment

# Versions for components installed in the cluster
management_cluster_versions:
  cert_manager: "v1.20.1"
  rancher_channel: "stable" # Use 'stable' or 'latest'

# Configuration for RKE2
rke2_config:
  version: "v1.34.6+rke2r3"

# Rancher Turtles (CAPI integration)
turtles_config:
  version: "v0.26.0"
  caprke2_version: "v0.21.1"  # latest v1beta1-compatible with Turtles v0.25.4 CAPI Operator
  capd_version: "v1.10.6"     # matches the CAPI CoreProvider version Turtles installs
  capa_version: "v2.7.1"      # cluster-api-provider-aws (v1beta1 contract)
  capm3_version: "v1.9.1"     # cluster-api-provider-metal3

# Fleet GitRepo: points to the git repo that contains cluster-templates/
# Set this to the HTTPS URL of the repository hosting this playbook.
capi_git_repo_url: "https://github.com/mbologna/rancher-fleet-clusters"
capi_git_branch: "main"
# Names of CAPI workload clusters to wait for (must match cluster-templates/clusters/*.yaml)
capi_clusters:
  - dev-cluster-01
  - dev-cluster-02
  - dev-cluster-03

# Default password for the Rancher admin user
rancher_bootstrap_password: "mbologna"
