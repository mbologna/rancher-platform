---
# Central configuration for the development environment

# Versions for components installed in the cluster
management_cluster_versions:
  cert_manager: "v1.20.1"
  rancher_channel: "stable" # Use 'stable' or 'latest'

# Configuration for RKE2
rke2_config:
  version: "v1.34.6+rke2r3"

# Rancher Turtles (CAPI integration)
turtles_config:
  version: "v0.26.0"
  caprke2_version: "v0.24.2"  # v1beta2 contract — compatible with Turtles v0.26.0 (CAPI Operator v0.26.0)
  capd_version: "v1.12.5"     # matches CAPI core version bundled in Turtles v0.26.0
  capa_version: "v2.10.2"     # cluster-api-provider-aws (v1beta2 contract)
  capm3_version: "v1.12.3"    # cluster-api-provider-metal3

# Fleet GitRepo: points to the public git repo containing cluster templates
# The public repo contains NO credentials — they are created below by Ansible.
capi_git_repo_url: "https://github.com/mbologna/rancher-fleet-clusters"
capi_git_branch: "main"

# CAPA (AWS) credentials — applied directly to the cluster by Ansible (not via Fleet)
# These become a Secret named "cluster-identity" in namespace "default",
# referenced by the AWSClusterStaticIdentity in the cluster manifest.
# Fill these in before running ./manage.sh deploy
capa_credentials:
  aws_access_key_id: "CHANGE_ME"
  aws_secret_access_key: "CHANGE_ME"
  aws_region: "eu-west-1"

# CAPM3 (Metal3 / Ironic) credentials — applied directly by Ansible
# Leave empty strings if you are not using Metal3
capm3_credentials:
  ironic_url: "http://CHANGE_ME:6385/v1/"
  ironic_inspector_url: "http://CHANGE_ME:5050/v1/"
  ironic_username: "CHANGE_ME"
  ironic_password: "CHANGE_ME"

# Names of CAPI workload clusters to wait for (must match clusters/ in rancher-fleet-clusters)
capi_clusters:
  - aws-rke2-example
  - aws-kubeadm-example
  - metal3-rke2-example

# Default password for the Rancher admin user
rancher_bootstrap_password: "mbologna"
