# ClusterClass and associated infrastructure templates for Docker + RKE2
# Used by CAPD (Cluster API Provider Docker) with the RKE2 bootstrap/control-plane provider.
# Nodes are Docker containers running kindest/node images on the host.
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: docker-rke2
  namespace: default
spec:
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: DockerClusterTemplate
      name: docker-rke2-cluster-template
  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: RKE2ControlPlaneTemplate
      name: docker-rke2-control-plane
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: DockerMachineTemplate
        name: docker-rke2-control-plane-machine
  workers:
    machineDeployments:
      - class: default-worker
        bootstrap:
          templateRef:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
            kind: RKE2ConfigTemplate
            name: docker-rke2-worker-bootstrap
        infrastructure:
          templateRef:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: DockerMachineTemplate
            name: docker-rke2-worker-machine
  variables:
    - name: dockerImage
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: The kindest/node image to use for cluster nodes.
  patches:
    - name: dockerImage
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: DockerMachineTemplate
            matchResources:
              controlPlane: true
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: add
              path: /spec/template/spec/customImage
              valueFrom:
                variable: dockerImage
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DockerClusterTemplate
metadata:
  name: docker-rke2-cluster-template
  namespace: default
spec:
  template:
    spec:
      loadBalancer:
        customHAProxyConfigTemplateRef:
          name: docker-rke2-lb-config
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: RKE2ControlPlaneTemplate
metadata:
  name: docker-rke2-control-plane
  namespace: default
spec:
  template:
    spec:
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
      serverConfig:
        cloudProviderName: external
        disableComponents:
          kubernetesComponents:
            - cloudController
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DockerMachineTemplate
metadata:
  name: docker-rke2-control-plane-machine
  namespace: default
spec:
  template:
    spec:
      bootstrapTimeout: 15m
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DockerMachineTemplate
metadata:
  name: docker-rke2-worker-machine
  namespace: default
spec:
  template:
    spec:
      bootstrapTimeout: 15m
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: RKE2ConfigTemplate
metadata:
  name: docker-rke2-worker-bootstrap
  namespace: default
spec:
  template:
    spec: {}
